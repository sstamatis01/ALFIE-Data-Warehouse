# Run multiple XAI Kafka consumer replicas in the SAME consumer group.
# Use with the base XAI compose (Flask services stay single-instance).
#
#   docker compose -f docker-compose.yaml -f docker-compose.replicas.yaml up -d \
#     universal-model-explainability flexible-data-interpretability \
#     kafka-xai-consumer-1 kafka-xai-consumer-2 kafka-xai-consumer-3
#
# Ensure the trigger topic has enough partitions (e.g. 3):
#   kafka-topics --bootstrap-server ... --alter --topic xai-trigger-events --partitions 3

services:
  kafka-xai-consumer-1:
    image: ${XAI_IMAGE:-gitlab.catalink.eu:5050/external/alfie_eu/alfie/xai}:${XAI_VERSION:-1.0.0}
    restart: unless-stopped
    command: ["python", "scripts/kafka_call.py"]
    environment:
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
      MPLBACKEND: Agg
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-host.docker.internal:9092}
      KAFKA_XAI_TRIGGER_TOPIC: ${KAFKA_XAI_TRIGGER_TOPIC:-xai-trigger-events}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-xai-consumer}
      API_BASE: ${API_BASE:-http://host.docker.internal:8000}
      UNIVERSAL_MODEL_EXPLAINABILITY_URL: ${UNIVERSAL_MODEL_EXPLAINABILITY_URL:-http://universal-model-explainability:5010/explain-model}
      FLEXIBLE_DATA_INTERPRETABILITY_URL: ${FLEXIBLE_DATA_INTERPRETABILITY_URL:-http://flexible-data-interpretability:5001/analyze-data}
      XAI_REPORTS_DIR: /app/reports-output
    volumes:
      - ${XAI_REPORTS_HOST_DIR:-./reports}:/app/reports-output
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      universal-model-explainability:
        condition: service_healthy
      flexible-data-interpretability:
        condition: service_healthy
    networks:
      - xai-network

  kafka-xai-consumer-2:
    extends:
      service: kafka-xai-consumer-1

  kafka-xai-consumer-3:
    extends:
      service: kafka-xai-consumer-1
