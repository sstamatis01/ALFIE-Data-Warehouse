services:
  # Local autodw stack: run 3 bias-detector replicas in the SAME consumer group.
  # Defined as separate services because base file sets `container_name` on `bias-detector`.

  bias-detector-1:
    image: ${AUTODW_IMAGE:-gitlab.catalink.eu:5050/external/alfie_eu/alfie/autodw}:${AUTODW_VERSION:-1.0.3}
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_BIAS_TRIGGER_TOPIC: bias-detection-trigger-events
      KAFKA_BIAS_TRIGGER_CONSUMER_GROUP: bias-trigger-consumer
      KAFKA_BIAS_TOPIC: bias-detection-complete-events
      API_BASE: http://api:8000
      BIAS_DW_DOWNLOAD_TIMEOUT_SECONDS: ${BIAS_DW_DOWNLOAD_TIMEOUT_SECONDS:-7200}
    depends_on:
      api:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - autodw-network
    command: >
      sh -c "sleep 10 && python kafka_bias_detector_consumer_example.py"

  bias-detector-2:
    extends:
      service: bias-detector-1
    command: >
      sh -c "sleep 11 && python kafka_bias_detector_consumer_example.py"

  bias-detector-3:
    extends:
      service: bias-detector-1
    command: >
      sh -c "sleep 12 && python kafka_bias_detector_consumer_example.py"

