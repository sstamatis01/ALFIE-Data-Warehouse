# AutoDW localized stack (localhost) — one compose file, multiple containers.
#
# What gets pulled from GitLab: only the `autodw` app image (api + kafka workers).
# MongoDB, MinIO, Kafka, GraphDB, Zookeeper: public images from Docker Hub.
#
# Setup (from repo root):
#   cp autodw/.env.example autodw/.env
#   Put graphdb_backup_*.tar.gz in graphdb_init/ (first GraphDB start)
#   docker login gitlab.catalink.eu:5050
#   docker compose -f autodw/docker-compose.yaml --env-file autodw/.env pull
#   docker compose -f autodw/docker-compose.yaml --env-file autodw/.env up -d --no-build
#   Use --build only when developing API code locally (see autodw/README.md)
#
# Exposed on the host:
#   API:    http://localhost:8000
#   Kafka:  localhost:9092
#
# Optional profiles:
#   --profile debug    start kafka-ui

services:
  mongodb:
    image: mongo:7.0
    container_name: autodw-mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-data_warehouse}
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s
    networks:
      - autodw-network

  minio:
    image: minio/minio:latest
    container_name: autodw-minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - autodw-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.4
    container_name: autodw-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - autodw-network

  kafka:
    image: confluentinc/cp-kafka:7.4.4
    container_name: autodw-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://${KAFKA_ADVERTISED_HOST:-localhost}:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 29092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - autodw-network

  kafka-ui:
    profiles: [debug]
    image: provectuslabs/kafka-ui:latest
    container_name: autodw-kafka-ui
    restart: unless-stopped
    ports:
      - "${KAFKA_UI_PORT:-8081}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: autodw
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      - kafka
    networks:
      - autodw-network

  graphdb:
    image: ontotext/graphdb:10.6.0
    container_name: autodw-graphdb
    restart: unless-stopped
    ports:
      - "${GRAPHDB_PORT:-7200}:7200"
    environment:
      GDB_HEAP_SIZE: ${GDB_HEAP_SIZE:-1g}
      GDB_MIN_MEM: ${GDB_MIN_MEM:-1g}
      GDB_MAX_MEM: ${GDB_MAX_MEM:-1g}
      GDB_MASTER_PASSWORD: ${GDB_MASTER_PASSWORD:-admin}
      INIT_BACKUP_DIR: /init-backup
    volumes:
      - graphdb_data:/opt/graphdb/home/data
      - graphdb_logs:/opt/graphdb/home/logs
      # Repo-root graphdb_init/ (paths relative to this compose file in autodw/)
      - ../graphdb_init:/init-backup:ro
      - ../graphdb_init/entrypoint.sh:/entrypoint.sh:ro
    # On Windows checkouts entrypoint.sh may have CRLF; normalize before running init.
    entrypoint:
      - /bin/sh
      - -c
      - "tr -d '\\r' < /entrypoint.sh > /tmp/entrypoint.sh && chmod +x /tmp/entrypoint.sh && exec /bin/sh /tmp/entrypoint.sh \"$@\""
      - --
    command:
      - /opt/graphdb/dist/bin/graphdb
      - -Dgraphdb.home=/opt/graphdb/home
      - -Dgraphdb.distribution=docker
    networks:
      - autodw-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7200/rest/repositories || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  api:
    image: ${AUTODW_IMAGE:-gitlab.catalink.eu:5050/external/alfie_eu/alfie/autodw}:${AUTODW_VERSION:-1.0.3}
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: autodw-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      # Seed Excel (same pattern as graphdb_init backup mount); also baked into image on build
      - ../etd_hub_init:/app/etd_hub_init:ro
    environment:
      ROOT_PATH: ${ROOT_PATH:-}
      MONGODB_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-password}@mongodb:27017/${MONGO_INITDB_DATABASE:-data_warehouse}?authSource=admin
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_SECURE: "false"
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-data-warehouse}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_DATASET_TOPIC: dataset-events
      KAFKA_GROUP_ID: data-warehouse-group
      KAFKA_AUTO_OFFSET_RESET: earliest
      # Seed ETD-Hub from /app/etd_hub_init/etd_hub_seed.xlsx when etd_themes is empty (image build)
      ETD_HUB_AUTO_SEED: ${ETD_HUB_AUTO_SEED:-true}
      ETD_HUB_SEED_PATH: ${ETD_HUB_SEED_PATH:-/app/etd_hub_init/etd_hub_seed.xlsx}
      # Seed GraphDB Mongo config when graphdb_configs is empty (after graphdb backup restore)
      GRAPHDB_AUTO_SEED: ${GRAPHDB_AUTO_SEED:-true}
      GRAPHDB_REST_URL: ${GRAPHDB_REST_URL:-http://graphdb:7200}
      GRAPHDB_INTERNAL_HOST: ${GRAPHDB_INTERNAL_HOST:-graphdb}
      GRAPHDB_PORT: ${GRAPHDB_PORT:-7200}
      GRAPHDB_REPOSITORY: ${GRAPHDB_REPOSITORY:-etd-hub-kg-test}
      GDB_USER: ${GDB_USER:-admin}
      GDB_PASS: ${GDB_MASTER_PASSWORD:-admin}
      GRAPHDB_CONFIG_CREATED_BY: ${GRAPHDB_CONFIG_CREATED_BY:-autodw}
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka:
        condition: service_healthy
      graphdb:
        condition: service_healthy
    networks:
      - autodw-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)\"",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 90s
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  bias-detector:
    image: ${AUTODW_IMAGE:-gitlab.catalink.eu:5050/external/alfie_eu/alfie/autodw}:${AUTODW_VERSION:-1.0.3}
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: autodw-bias-detector
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_BIAS_TRIGGER_TOPIC: bias-detection-trigger-events
      KAFKA_BIAS_TRIGGER_CONSUMER_GROUP: bias-trigger-consumer
      API_BASE: http://api:8000
    depends_on:
      api:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - autodw-network
    command: >
      sh -c "sleep 5 && python kafka_bias_detector_consumer_example.py"

  automl-consumer:
    image: ${AUTODW_IMAGE:-gitlab.catalink.eu:5050/external/alfie_eu/alfie/autodw}:${AUTODW_VERSION:-1.0.3}
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: autodw-automl-consumer
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_AUTOML_TRIGGER_TOPIC: automl-trigger-events
      KAFKA_CONSUMER_GROUP: automl-consumer
      API_BASE: http://api:8000
      DW_HOST: api
      DW_PORT: 8000
      TABULAR_AUTOML_HOST: ${TABULAR_AUTOML_HOST:-host.docker.internal}
      TABULAR_AUTOML_PORT: ${TABULAR_AUTOML_PORT:-8001}
      VISION_AUTOML_HOST: ${VISION_AUTOML_HOST:-host.docker.internal}
      VISION_AUTOML_PORT: ${VISION_AUTOML_PORT:-8002}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      api:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - autodw-network
    command: >
      sh -c "sleep 10 && python kafka_automl_consumer_example_v3.py"

volumes:
  mongodb_data:
  minio_data:
  graphdb_data:
  graphdb_logs:

networks:
  autodw-network:
    driver: bridge
