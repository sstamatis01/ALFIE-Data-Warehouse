# AutoDW localized stack (localhost) — one compose file, multiple containers.
#
# What gets pulled from GitLab: only the `autodw` app image (api + kafka workers).
# MongoDB, MinIO, Kafka, GraphDB, Zookeeper: public images from Docker Hub.
#
# Setup:
#   cp autodw/.env.example autodw/.env
#   docker login gitlab.catalink.eu:5050
#   docker compose -f autodw/docker-compose.yaml --env-file autodw/.env up -d
#
# Exposed on the host:
#   API:    http://localhost:8000
#   Kafka:  localhost:9092
#
# Optional profiles:
#   --profile automl   start automl-consumer
#   --profile debug    start kafka-ui

services:
  mongodb:
    image: mongo:7.0
    container_name: autodw-mongodb
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-data_warehouse}
    volumes:
      - mongodb_data:/data/db
    networks:
      - autodw-network

  minio:
    image: minio/minio:latest
    container_name: autodw-minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - autodw-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.4
    container_name: autodw-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - autodw-network

  kafka:
    image: confluentinc/cp-kafka:7.4.4
    container_name: autodw-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://${KAFKA_ADVERTISED_HOST:-localhost}:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 29092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - autodw-network

  kafka-ui:
    profiles: [debug]
    image: provectuslabs/kafka-ui:latest
    container_name: autodw-kafka-ui
    restart: unless-stopped
    ports:
      - "${KAFKA_UI_PORT:-8081}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: autodw
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      - kafka
    networks:
      - autodw-network

  graphdb:
    image: ontotext/graphdb:10.6.0
    container_name: autodw-graphdb
    restart: unless-stopped
    ports:
      - "${GRAPHDB_PORT:-7200}:7200"
    environment:
      GDB_HEAP_SIZE: ${GDB_HEAP_SIZE:-1g}
      GDB_MIN_MEM: ${GDB_MIN_MEM:-1g}
      GDB_MAX_MEM: ${GDB_MAX_MEM:-1g}
      GDB_MASTER_PASSWORD: ${GDB_MASTER_PASSWORD:-admin}
    volumes:
      - graphdb_data:/opt/graphdb/home/data
      - graphdb_logs:/opt/graphdb/home/logs
    command:
      - /opt/graphdb/dist/bin/graphdb
      - -Dgraphdb.home=/opt/graphdb/home
      - -Dgraphdb.distribution=docker
    networks:
      - autodw-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7200/rest/repositories || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  api:
    image: ${AUTODW_IMAGE:-gitlab.catalink.eu:5050/external/alfie_eu/alfie/autodw}:${AUTODW_VERSION:-1.0.0}
    container_name: autodw-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      ROOT_PATH: ${ROOT_PATH:-}
      MONGODB_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-password}@mongodb:27017/${MONGO_INITDB_DATABASE:-data_warehouse}?authSource=admin
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_SECURE: "false"
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-data-warehouse}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_DATASET_TOPIC: dataset-events
      KAFKA_GROUP_ID: data-warehouse-group
      KAFKA_AUTO_OFFSET_RESET: earliest
    depends_on:
      mongodb:
        condition: service_started
      minio:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - autodw-network
    command: >
      sh -c "sleep 10 && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  bias-detector:
    image: ${AUTODW_IMAGE:-gitlab.catalink.eu:5050/external/alfie_eu/alfie/autodw}:${AUTODW_VERSION:-1.0.0}
    container_name: autodw-bias-detector
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_BIAS_TRIGGER_TOPIC: bias-detection-trigger-events
      KAFKA_BIAS_TRIGGER_CONSUMER_GROUP: bias-trigger-consumer
      API_BASE: http://api:8000
    depends_on:
      api:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - autodw-network
    command: >
      sh -c "sleep 15 && python kafka_bias_detector_consumer_example.py"

  automl-consumer:
    profiles: [automl]
    image: ${AUTODW_IMAGE:-gitlab.catalink.eu:5050/external/alfie_eu/alfie/autodw}:${AUTODW_VERSION:-1.0.0}
    container_name: autodw-automl-consumer
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_AUTOML_TRIGGER_TOPIC: automl-trigger-events
      KAFKA_CONSUMER_GROUP: automl-consumer
      API_BASE: http://api:8000
      DW_HOST: api
      DW_PORT: 8000
      TABULAR_AUTOML_HOST: ${TABULAR_AUTOML_HOST:-host.docker.internal}
      TABULAR_AUTOML_PORT: ${TABULAR_AUTOML_PORT:-8001}
      VISION_AUTOML_HOST: ${VISION_AUTOML_HOST:-host.docker.internal}
      VISION_AUTOML_PORT: ${VISION_AUTOML_PORT:-8002}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      api:
        condition: service_started
      kafka:
        condition: service_healthy
    networks:
      - autodw-network
    command: >
      sh -c "sleep 20 && python kafka_automl_consumer_example_v3.py"

volumes:
  mongodb_data:
  minio_data:
  graphdb_data:
  graphdb_logs:

networks:
  autodw-network:
    driver: bridge
